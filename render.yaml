# Render blueprint for SPLITO (backend web service + static frontend).
# Postgres is hosted externally on Neon — set DATABASE_URL in the Render dashboard
# (never commit the connection string; it carries a password).
# Deploy: push to GitHub, then "New > Blueprint" on render.com and point at this file.
services:
  - type: web
    name: splito-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string here in the dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to your frontend URL after first deploy
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  - type: web
    name: splito-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to https://splito-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
