# Render blueprint for the SPLITO backend API only.
# The frontend is hosted on Netlify (see netlify.toml); Postgres is on Neon —
# set DATABASE_URL in the Render dashboard (never commit the connection string).
# Deploy: push to GitHub, then "New > Blueprint" on render.com and point at this file.
services:
  - type: web
    name: splito-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string here in the dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # your Netlify URL, e.g. https://comfy-centaur-05172a.netlify.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
